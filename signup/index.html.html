<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Signup form</title>
    <link rel="stylesheet" href="signup.css">

</head>
<body>
    <form id="myform">
        <h1 id="signup">Signup form </h1>
        <label>Enter Username</label>
        <input type="text" placeholder="Enter username" required/>
        <label>Email</label>
        <!--nandini@-->
        <input type="email" placeholder="Enter email" required/>
        <label>Mobile Number</label>
        <input type="number" placeholder="Enter Mobile Number" required/>
        <label>Password</label>
        <input type="password" placeholder="Enter Mobile number" required/>
        <div>
            <input type="radio" name="gender" value="male"><span>Male</span>
            <input type="radio" name="gender" value="female"><span>Female</span>
        </div>
        <select>
            <option selected hidden> Select anyone opted our website</option>
            <option value="insta">Instagram</option>
            <option value="fb">Facebook</option>
            <option value="git">Github</option>
            <option value="linkedin">Linkedin</option>
        </select>
        <div>
            <input type="Checkbox"/>
            <p>I accept the rules & regulations</p>
        </div>
        <textarea></textarea>
        <button>Sign up</button>
    </form>
</body>
</html>
